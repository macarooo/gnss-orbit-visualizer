<!DOCTYPE html>
<html lang="zh-CN"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卫星轨道多源数据综合可视化系统</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-title">
            <span class="title-icon">🛰️</span>
            <h1>卫星轨道多源数据综合可视化系统</h1>
            <span class="subtitle">Multi-source Satellite Orbit Visualization</span>
        </div>
        <div class="header-controls">
            <select id="dataSourceSelect" class="control-select">
                <option value="tle">TLE 轨道数据</option>
                <option value="rinex">RINEX 星历数据</option>
            </select>
            <button id="refreshBtn" class="control-btn">🔄 刷新数据</button>
        </div>
    </header>
    <main class="main-content">
        <aside class="left-panel">
            <div class="panel-section">
                <h3>📡 卫星系统</h3>
                <div class="satellite-systems">
                    <label class="checkbox-item"><input type="checkbox" id="gps-check" checked><span class="system-color" style="background:#2563eb"></span>GPS (美国)</label>
                    <label class="checkbox-item"><input type="checkbox" id="glonass-check" checked><span class="system-color" style="background:#dc2626"></span>GLONASS (俄罗斯)</label>
                    <label class="checkbox-item"><input type="checkbox" id="galileo-check" checked><span class="system-color" style="background:#d97706"></span>Galileo (欧盟)</label>
                    <label class="checkbox-item"><input type="checkbox" id="beidou-check" checked><span class="system-color" style="background:#16a34a"></span>BeiDou (中国)</label>
                    <label class="checkbox-item"><input type="checkbox" id="qzss-check" checked><span class="system-color" style="background:#7c3aed"></span>QZSS (日本)</label>
                    <label class="checkbox-item"><input type="checkbox" id="irnss-check" checked><span class="system-color" style="background:#0891b2"></span>IRNSS (印度)</label>
                    <label class="checkbox-item"><input type="checkbox" id="sbas-check" checked><span class="system-color" style="background:#db2777"></span>SBAS</label>
                </div>
            </div>
            <div class="panel-section">
                <h3>📊 卫星数量</h3>
                <div id="satelliteCount" class="count-display">0</div>
            </div>
            <div class="panel-section">
                <h3>📤 上传 RINEX 文件</h3>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="rinexFileInput" accept=".rnx,.obs,.RINEX,.OBS" style="display:none">
                    <button id="uploadBtn" class="upload-btn">选择 RINEX 文件</button>
                    <div id="uploadStatus" class="upload-status"></div>
                </div>
            </div>
        </aside>
        <div class="cesium-container" id="cesiumContainer"></div>
    </main>
    <script src="js/config.js?v=2"></script>
    <script src="js/satellite_data.js?v=2"></script>
    <script src="js/orbit_calculator.js?v=2"></script>
    <script src="js/cesium_manager.js?v=2"></script>
    <script src="js/ui_controller.js?v=2"></script>
    <script src="js/main.js?v=2"></script>
</body>
</html>
